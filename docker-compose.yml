# Docker Compose

services:
  immich-swipe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: immich-swipe
    restart: unless-stopped
    ports:
      - "2293:8080"
    environment:
      # Runtime configuration (no rebuild needed for changes)
      - LISTEN_ADDR=:8080
      - IMMICH_SERVER_URL=${IMMICH_SERVER_URL:-}
      - IMMICH_API_KEY_1_NAME=${IMMICH_API_KEY_1_NAME:-}
      - IMMICH_API_KEY_1_KEY=${IMMICH_API_KEY_1_KEY:-}
      - IMMICH_API_KEY_2_NAME=${IMMICH_API_KEY_2_NAME:-}
      - IMMICH_API_KEY_2_KEY=${IMMICH_API_KEY_2_KEY:-}
      - IMMICH_API_KEY_3_NAME=${IMMICH_API_KEY_3_NAME:-}
      - IMMICH_API_KEY_3_KEY=${IMMICH_API_KEY_3_KEY:-}
      - IMMICH_API_KEY_4_NAME=${IMMICH_API_KEY_4_NAME:-}
      - IMMICH_API_KEY_4_KEY=${IMMICH_API_KEY_4_KEY:-}
      - IMMICH_API_KEY_5_NAME=${IMMICH_API_KEY_5_NAME:-}
      - IMMICH_API_KEY_5_KEY=${IMMICH_API_KEY_5_KEY:-}
