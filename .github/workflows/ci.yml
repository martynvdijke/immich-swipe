name: CI checks

on:
  workflow_call:
  push:
    branches-ignore:
      - 'main'
  pull_request:
    branches:
      - "**"

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run type-check

      - name: Build frontend
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: server/go.mod

      - name: Verify Go build
        run: cd server && go build -o /dev/null .
